[project]
name = "pydap-icechunk"
version = "0"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"


##### pixi

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[tool.pixi.package.build.backend]
name = "pixi-build-python"
version = "==0.4.4"
channels = ["https://prefix.dev/conda-forge"]

#[tool.pixi.package.build.config]
#ignore-pypi-mapping = false

[tool.pixi.dependencies]
#pydap = ">=3.5.8,<4"
xarray = ">=2025.12.0,<2026"
icechunk = ">=1.1.16,<2"
gunicorn = ">=23.0.0,<24"  # TODO shouldn't be required. This is a mistake/judgment error in pydap.wsgi.app.

[tool.pixi.feature.dev.dependencies]
werkzeug = ">=3.1.5,<4"
netcdf4 = ">=1.7.4,<2"

[tool.pixi.feature.dev.pypi-dependencies]
pydap-icechunk = { path = ".", editable = true }
pydap = { path = "../pydap", editable = true}
docopt = '*'
jinja2 = '*'
types-webob = '*'

[tool.pixi.package.host-dependencies]
setuptools = ">=80,<90"

[tool.pixi.environments]
default = {features = ["dev"], solve-group = "prod"}
prod = {features = [], solve-group = "prod"}

