  <title
     id="title2">Sigrid Climate Data Library — architecture and data flow diagram</title>
  <desc
     id="desc4">Two-level layout: software on top row, data stores on bottom row, connected by diagonal arrows. Green = ahead-of-time processing; purple = on-the-fly serving. External sources left, scientists right.</desc>
