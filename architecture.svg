      raw files:      cx=275  (gap: 266..284)
      icechunk store: cx=411  (gap: 402..420)

    Horizontal arrows (software row, cy=78):
      cooked-catalog right(538,78) → pydap-icechunk left(556,78)
      pydap-icechunk right(674,78) → scientists left(758,78)

    Sigrid boundary: x=140..682, y=36..260

    Scientists: x=758, cx=817, w=118, y=50
    Legend: x=720, y=178, in data-store row area
