       preserveAspectRatio="xMidYMid">
      <path
         d="M 2,1 8,5 2,9"
         fill="none"
         stroke="context-stroke"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path6" />
    </marker>
